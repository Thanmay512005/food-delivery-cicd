global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'quickbite-monitor'

scrape_configs:

  # Monitor Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Monitor your Flask Food Delivery App
  - job_name: 'quickbite_app'
    static_configs:
      - targets: ['app:5000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Monitor Nginx
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:80']
    metrics_path: '/nginx-health'
    scrape_interval: 30s
