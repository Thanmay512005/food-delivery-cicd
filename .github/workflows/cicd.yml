name: QuickBite CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ─── Job 1: Run Tests ───────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: |
          pytest test_app.py -v --tb=short

  # ─── Job 2: Build Docker Image ──────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t quickbite-app:latest .

      - name: Verify image was built
        run: |
          docker images quickbite-app

      - name: Test container starts correctly
        run: |
          docker run -d --name test_container -p 5000:5000 quickbite-app:latest
          sleep 5
          docker ps
          docker logs test_container

  # ─── Job 3: Deployment Check ────────────────────────────────
  deploy:
    name: Deployment Ready Check
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify all required files exist
        run: |
          echo "Checking all required files..."
          test -f app.py           && echo "✅ app.py found"
          test -f requirements.txt && echo "✅ requirements.txt found"
          test -f Dockerfile       && echo "✅ Dockerfile found"
          test -f docker-compose.yml && echo "✅ docker-compose.yml found"
          test -f nginx.conf       && echo "✅ nginx.conf found"
          test -f prometheus.yml   && echo "✅ prometheus.yml found"

      - name: Validate docker-compose file
        run: |
          docker compose config

      - name: Pipeline complete
        run: |
          echo "🚀 All checks passed!"
          echo "✅ Tests passed"
          echo "✅ Docker image built"
          echo "✅ All files verified"
          echo "✅ App is ready to deploy"
